name: Refresh plan data

# Pulls the current PowerToChoose data monthly, regenerates the per-region JSON
# and price history, and commits it. The push triggers Cloudflare Pages to
# rebuild and redeploy automatically (Git integration). If PowerToChoose is
# unreachable, the job fails and the last-good committed data stays live —
# never a broken or blank site.
on:
  schedule:
    - cron: "0 9 1 * *" # 09:00 UTC on the 1st of each month
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF parsers (for EFL verification)
        run: pip install pypdf pdfplumber

      - name: Verify EFLs (resumable; non-blocking)
        run: python scripts/verify_efls.py --live
        continue-on-error: true

      - name: Pull live data + rebuild region JSON and history
        run: python scripts/run_pipeline.py --live

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name "honest-texas-electricity-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/src/data web/public/data
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "chore: monthly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
